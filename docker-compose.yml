services:
  # --- 0. EDGE API GATEWAY (NGINX - CLOUD NATIVE) ---
  nginx:
    image: nginx:alpine
    container_name: billingflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NGINX_API_RATE=${NGINX_API_RATE}
      - NGINX_AUTH_RATE=${NGINX_AUTH_RATE}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    networks:
      - billing_network
    depends_on:
      api:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "20m"

  # --- 1. RELATIONAL DATABASE (SQL SERVER 2022) ---
  sqldb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: billingflow_sqldb
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldb_data:/var/opt/mssql
    networks:
      - billing_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # --- 2. DISTRIBUTED CACHE & PUB/SUB (REDIS FOR SIGNALR) ---
  redis:
    image: redis:7-alpine
    container_name: billingflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - billing_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"

  # --- 3. DATABASE MIGRATOR (INIT CONTAINER) ---
  migrator:
    build:
      context: .
      dockerfile: src/BillingFlow.Migrations/Dockerfile
    container_name: billingflow_migrator
    restart: "no" 
    environment:
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT}"
      ConnectionStrings__DefaultConnection: "Server=sqldb;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
    networks:
      - billing_network
    depends_on:
      sqldb:
        condition: service_healthy

  # --- 4. MAIN API APPLICATION ---
  api:
    build:
      context: .
      dockerfile: src/BillingFlow.Api/Dockerfile
    container_name: billingflow_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqldb;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"

      # --- RATE LIMITING DYNAMIC OVERRIDES ---
      RateLimiting__GlobalPermitLimit: "${RATE_LIMIT_GLOBAL_PERMIT_LIMIT}"
      RateLimiting__GlobalWindowMinutes: "${RATE_LIMIT_GLOBAL_WINDOW_MINUTES}"
      
      RateLimiting__PasswordResetPermitLimit: "${RATE_LIMIT_PASSWORD_RESET_PERMIT_LIMIT}"
      RateLimiting__PasswordResetWindowMinutes: "${RATE_LIMIT_PASSWORD_RESET_WINDOW_MINUTES}"
      
      RateLimiting__LoginPermitLimit: "${RATE_LIMIT_LOGIN_PERMIT_LIMIT}"
      RateLimiting__LoginWindowMinutes: "${RATE_LIMIT_LOGIN_WINDOW_MINUTES}"
      
      RateLimiting__EmailVerificationPermitLimit: "${RATE_LIMIT_EMAIL_VERIFICATION_PERMIT_LIMIT}"
      RateLimiting__EmailVerificationWindowMinutes: "${RATE_LIMIT_EMAIL_VERIFICATION_WINDOW_MINUTES}"
    expose:
      - "8080" 
    networks:
      - billing_network
    depends_on:
      sqldb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # --- 5. STRIPE CLI (Local Webhook Forwarding) ---
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: billingflow_stripe_cli
    restart: unless-stopped
    command: "listen --api-key ${STRIPE_SECRET_KEY} --forward-to http://nginx:80/api/webhooks/stripe --latest"
    networks:
      - billing_network
    depends_on:
      api:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

volumes:
  sqldb_data:
  redis_data:

# Deterministic Bridge Subnet matching ASP.NET KnownIPNetworks local profile
networks:
  billing_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16