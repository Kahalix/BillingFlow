services:
  # --- 0. EDGE API GATEWAY (NGINX - CLOUD NATIVE) ---
  nginx:
    image: nginx:1.31.2-alpine
    container_name: billingflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NGINX_API_RATE=${NGINX_API_RATE}
      - NGINX_AUTH_RATE=${NGINX_AUTH_RATE}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    networks:
      - billing_network
    depends_on:
      api:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "20m"

  # --- 1. RELATIONAL DATABASE (SQL SERVER 2022) ---
  sqldb:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: billingflow_sqldb
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldb_data:/var/opt/mssql
    networks:
      - billing_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-U", "sa", "-P", "${DB_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # --- 2. DISTRIBUTED CACHE & PUB/SUB (REDIS FOR SIGNALR) ---
  redis:
    image: redis:7.4.8-alpine
    container_name: billingflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - billing_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"

  # --- 3. DATABASE MIGRATOR (INIT CONTAINER) ---
  migrator:
    build:
      context: .
      dockerfile: src/BillingFlow.Migrations/Dockerfile
    container_name: billingflow_migrator
    restart: "no" 
    environment:
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT}"
      ConnectionStrings__DefaultConnection: "Server=sqldb;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
    networks:
      - billing_network
    depends_on:
      sqldb:
        condition: service_healthy

  # --- 4. MAIN API APPLICATION ---
  api:
    build:
      context: .
      dockerfile: src/BillingFlow.Api/Dockerfile
    container_name: billingflow_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqldb;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__Redis: "${REDIS_CONNECTION}"
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"

      # --- RATE LIMITING DYNAMIC OVERRIDES ---
      RateLimiting__GlobalPermitLimit: "${RATE_LIMIT_GLOBAL_PERMIT_LIMIT}"
      RateLimiting__GlobalWindowMinutes: "${RATE_LIMIT_GLOBAL_WINDOW_MINUTES}"
      
      RateLimiting__PasswordResetPermitLimit: "${RATE_LIMIT_PASSWORD_RESET_PERMIT_LIMIT}"
      RateLimiting__PasswordResetWindowMinutes: "${RATE_LIMIT_PASSWORD_RESET_WINDOW_MINUTES}"
      
      RateLimiting__LoginPermitLimit: "${RATE_LIMIT_LOGIN_PERMIT_LIMIT}"
      RateLimiting__LoginWindowMinutes: "${RATE_LIMIT_LOGIN_WINDOW_MINUTES}"
      
      RateLimiting__EmailVerificationPermitLimit: "${RATE_LIMIT_EMAIL_VERIFICATION_PERMIT_LIMIT}"
      RateLimiting__EmailVerificationWindowMinutes: "${RATE_LIMIT_EMAIL_VERIFICATION_WINDOW_MINUTES}"
    expose:
      - "8080" 
    networks:
      - billing_network
    depends_on:
      sqldb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # --- 5. STRIPE CLI (Local Webhook Forwarding) ---
  stripe-cli:
    image: stripe/stripe-cli:v1.43.2
    container_name: billingflow_stripe_cli
    restart: unless-stopped
    command: "listen --api-key ${STRIPE_SECRET_KEY} --forward-to http://nginx:80/api/webhooks/stripe --latest"
    networks:
      - billing_network
    depends_on:
      api:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

# --- 6. OBSERVABILITY STACK (PLG + TEMPO + ALLOY) ---
  
  loki:
    image: grafana/loki:3.0.0
    container_name: billingflow_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - billing_network

  alloy:
    image: grafana/alloy:v1.17.0
    container_name: billingflow_alloy
    restart: unless-stopped
    ports:
      - "4317:4317" # Exposed for stable internal .NET OTLP push flow
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/config.alloy:/etc/alloy/config.alloy:ro
    command: 
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    networks:
      - billing_network
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: billingflow_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--enable-feature=remote-write-receiver' # Crucial for Alloy remote_write stream
    networks:
      - billing_network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: billingflow_tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo-config.yaml:ro
      - tempo_data:/tmp/tempo
    command: [ "-config.file=/etc/tempo-config.yaml" ]
    networks:
      - billing_network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: billingflow_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    networks:
      - billing_network
    depends_on:
      - loki
      - prometheus
      - tempo

volumes:
  sqldb_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:
  tempo_data:

# Deterministic Bridge Subnet matching ASP.NET KnownIPNetworks local profile
networks:
  billing_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16