apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Explicitly disable TraceQL Streaming (gRPC) using the correct schema to avoid frame size errors
      streamingEnabled:
        search: false
        metrics: false
      search:
        hide: false
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: 'loki'
        tags: ['job', 'instance', 'pod', 'namespace']
        mappedTags: [{ key: 'service.name', value: 'service_name' }]
        mapTagNamesEnabled: false
        customQuery: true
        query: '{service_name="${__tags.service_name}"} |= "${__trace.traceId}"'